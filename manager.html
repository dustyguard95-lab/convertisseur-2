<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AllResell Manager V1 Pro</title>
<style>
body{font-family:-apple-system,sans-serif;background:#121212;color:#fff;max-width:1400px;margin:auto;padding:15px}
.card{background:#1d1d1f;border-radius:18px;padding:15px;margin:12px 0}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px}
input,select,textarea,button{width:100%;box-sizing:border-box;border:none;border-radius:12px;padding:12px;margin-top:8px}
input,select,textarea{background:#2c2c2e;color:#fff}
button{background:#0A84FF;color:white;font-weight:bold}
.stat{background:#181818;padding:12px;border-radius:14px}
.item{background:#181818;padding:12px;border-radius:14px;margin-top:10px}
img{max-width:120px;border-radius:10px;margin-top:8px}
.small{color:#aaa;font-size:12px}
</style>
</head>
<body>

<h1>📦 AllResell Manager V1 Pro</h1>

<div class="card">
<h2>➕ Ajouter un article</h2>
<div class="grid">
<input id="f-name" placeholder="Nom">
<input id="f-brand" placeholder="Marque">
<input id="f-size" placeholder="Taille">
<input id="f-buy" type="number" placeholder="Prix achat">
<input id="f-ship" type="number" placeholder="Livraison">
<input id="f-sell" type="number" placeholder="Prix vente prévu">
<input id="f-weight" type="number" placeholder="Poids (g)">
<input id="f-qc" type="number" placeholder="Score QC /100">
</div>
<input id="f-link" placeholder="Lien produit">
<input id="f-tracking" placeholder="Numéro de suivi">
<select id="f-status">
<option>🟡 Commandé</option>
<option>🟠 Entrepôt</option>
<option>🔵 Expédié</option>
<option>🟢 Reçu</option>
<option>💰 Vendu</option>
</select>
<textarea id="f-notes" placeholder="Notes"></textarea>
<input id="f-photo" type="file" accept="image/*">
<button onclick="addItem()">📦 Ajouter l'article</button>
</div>

<div class="card">
<h2>📊 Dashboard</h2>
<div class="grid">
<div class="stat">📦 Articles : <span id="c1">0</span></div>
<div class="stat">💸 Investi : <span id="c2">0€</span></div>
<div class="stat">📈 Valeur estimée : <span id="c3">0€</span></div>
<div class="stat">✅ Profit potentiel : <span id="c4">0€</span></div>
<div class="stat">💰 Vendus : <span id="c5">0</span></div>
<div class="stat">⭐ QC moyen : <span id="c6">0</span></div>
</div>
</div>

<div class="card">
<h2>🔍 Recherche</h2>
<input id="search" placeholder="Rechercher..." oninput="render()">
</div>

<div class="card">
<h2>📋 Stock</h2>
<div id="list"></div>
</div>

<script>
let data = [];
try {
  data = JSON.parse(localStorage.getItem("allresell_v1") || "[]");
} catch(e) {
  data = [];
}

function save(){
  try {
    localStorage.setItem("allresell_v1", JSON.stringify(data));
  } catch(e) {
    console.error("Sauvegarde impossible :", e);
  }
}

function esc(str){
  const d = document.createElement('div');
  d.textContent = str ?? "";
  return d.innerHTML;
}

function addItem(){
  const elName = document.getElementById("f-name");
  const elBrand = document.getElementById("f-brand");
  const elSize = document.getElementById("f-size");
  const elBuy = document.getElementById("f-buy");
  const elShip = document.getElementById("f-ship");
  const elSell = document.getElementById("f-sell");
  const elWeight = document.getElementById("f-weight");
  const elQc = document.getElementById("f-qc");
  const elLink = document.getElementById("f-link");
  const elTracking = document.getElementById("f-tracking");
  const elStatus = document.getElementById("f-status");
  const elNotes = document.getElementById("f-notes");
  const elPhoto = document.getElementById("f-photo");

  if (!elName.value.trim()){
    alert("Ajoute au moins un nom d'article.");
    return;
  }

  const file = elPhoto.files[0];

  function create(img=""){
    data.unshift({
      name: elName.value,
      brand: elBrand.value,
      size: elSize.value,
      buy: +elBuy.value || 0,
      ship: +elShip.value || 0,
      sell: +elSell.value || 0,
      weight: +elWeight.value || 0,
      qc: +elQc.value || 0,
      link: elLink.value,
      tracking: elTracking.value,
      status: elStatus.value,
      notes: elNotes.value,
      photo: img,
      date: new Date().toLocaleDateString()
    });
    save();
    render();

    [elName, elBrand, elSize, elBuy, elShip, elSell, elWeight, elQc, elLink, elTracking, elNotes].forEach(el => el.value = "");
    elStatus.selectedIndex = 0;
    elPhoto.value = "";
  }

  if (file){
    const r = new FileReader();
    r.onload = e => create(e.target.result);
    r.readAsDataURL(file);
  } else {
    create();
  }
}

function del(i){
  data.splice(i, 1);
  save();
  render();
}

function render(){
  const searchEl = document.getElementById("search");
  const q = (searchEl.value || "").toLowerCase();

  let invested = 0, val = 0, profit = 0, sold = 0, qcavg = 0;

  data.forEach(x => {
    invested += (x.buy || 0) + (x.ship || 0);
    val += (x.sell || 0);
    profit += (x.sell || 0) - ((x.buy || 0) + (x.ship || 0));
    if ((x.status || "").includes("Vendu")) sold++;
    qcavg += x.qc || 0;
  });

  document.getElementById("c1").textContent = data.length;
  document.getElementById("c2").textContent = invested.toFixed(2) + "€";
  document.getElementById("c3").textContent = val.toFixed(2) + "€";
  document.getElementById("c4").textContent = profit.toFixed(2) + "€";
  document.getElementById("c5").textContent = sold;
  document.getElementById("c6").textContent = data.length ? (qcavg / data.length).toFixed(1) : 0;

  const list = document.getElementById("list");
  list.innerHTML = "";

  const filtered = data.filter(x => JSON.stringify(x).toLowerCase().includes(q));

  if (filtered.length === 0){
    list.innerHTML = `<div class="small">Aucun article pour l'instant.</div>`;
    return;
  }

  filtered.forEach((x, i) => {
    const total = (x.buy || 0) + (x.ship || 0);
    const gain = (x.sell || 0) - total;
    const margin = total ? ((gain / total) * 100).toFixed(1) : 0;

    list.innerHTML += `
<div class="item">
<h3>${esc(x.name) || "Article"}</h3>
<div>${esc(x.status)}</div>
<div class="small">📅 ${esc(x.date)}</div>
<div>🏷️ ${esc(x.brand)}</div>
<div>📏 Taille : ${esc(x.size)}</div>
<div>⚖️ ${x.weight || 0} g</div>
<div>💸 Coût total : ${total.toFixed(2)}€</div>
<div>💰 Vente prévue : ${(x.sell || 0).toFixed(2)}€</div>
<div>📈 Profit : ${gain.toFixed(2)}€</div>
<div>🚀 Marge : ${margin}%</div>
<div>⭐ QC : ${x.qc || 0}/100</div>
<div>📦 Suivi : ${esc(x.tracking) || "-"}</div>
<div>📝 ${esc(x.notes) || "-"}</div>
${x.link ? `<a href="${esc(x.link)}" target="_blank">🔗 Ouvrir le lien</a>` : ""}
${x.photo ? `<br><img src="${x.photo}">` : ""}
<button onclick="del(${i})">🗑️ Supprimer</button>
</div>`;
  });
}

render();
</script>
</body>
</html>
