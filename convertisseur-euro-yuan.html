<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Convertisseur € / ¥</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0B0D10;
    --card:#15181D;
    --card-border:#22262d;
    --text:#EDEFF2;
    --muted:#8A8F98;
    --blue:#3B9EFF;
    --green:#3DDC84;
    --red:#FF5C5C;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    padding:28px 16px 60px;
  }
  .wrap{ width:100%; max-width:440px; }
  .eyebrow{
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:var(--blue);
    margin-bottom:6px;
  }
  h1{
    font-family:'Space Grotesk',sans-serif;
    font-size:26px;
    font-weight:700;
    margin:0 0 4px;
  }
  .sub{ color:var(--muted); font-size:14px; margin-bottom:24px; line-height:1.4; }

  .card{
    background:var(--card);
    border:1px solid var(--card-border);
    border-radius:16px;
    padding:20px;
    margin-bottom:14px;
  }

  .field-label{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    letter-spacing:.1em;
    text-transform:uppercase;
    color:var(--muted);
    margin-bottom:8px;
  }
  .amount-row{
    display:flex;
    align-items:center;
    gap:10px;
  }
  .amount-row input{
    flex:1;
    background:#0d0f13;
    border:1px solid var(--card-border);
    border-radius:12px;
    padding:14px 16px;
    color:var(--text);
    font-family:'JetBrains Mono',monospace;
    font-size:22px;
    font-weight:700;
    outline:none;
    min-width:0;
    transition:border-color .15s ease;
  }
  .amount-row input:focus{ border-color:var(--blue); }
  .currency-tag{
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:16px;
    color:var(--muted);
    flex-shrink:0;
    width:52px;
  }

  .swap-row{
    display:flex;
    justify-content:center;
    margin:6px 0;
  }
  .swap-btn{
    background:#0d0f13;
    border:1px solid var(--card-border);
    color:var(--blue);
    border-radius:50%;
    width:42px;
    height:42px;
    font-size:18px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:transform .2s ease, border-color .15s ease;
  }
  .swap-btn:hover{ border-color:var(--blue); }
  .swap-btn.spin{ transform:rotate(180deg); }

  .rate-line{
    display:flex;
    align-items:center;
    justify-content:space-between;
    font-family:'JetBrains Mono',monospace;
    font-size:12.5px;
    color:var(--muted);
    margin-top:4px;
  }
  .rate-line .rate-val{ color:var(--text); font-weight:600; }
  .status-dot{
    display:inline-block;
    width:7px; height:7px;
    border-radius:50%;
    margin-right:6px;
    background:var(--muted);
  }
  .status-dot.live{ background:var(--green); }
  .status-dot.offline{ background:var(--red); }

  .refresh-btn{
    background:none;
    border:1px solid var(--card-border);
    color:var(--muted);
    border-radius:10px;
    padding:8px 12px;
    font-family:'Inter',sans-serif;
    font-size:12.5px;
    font-weight:600;
    cursor:pointer;
    width:100%;
    margin-top:12px;
    transition:color .15s ease, border-color .15s ease;
  }
  .refresh-btn:hover{ color:var(--blue); border-color:var(--blue); }

  .manual-toggle{
    display:block;
    text-align:center;
    color:var(--muted);
    font-size:12.5px;
    margin-top:12px;
    text-decoration:underline;
    cursor:pointer;
    background:none;
    border:none;
    font-family:'Inter',sans-serif;
    width:100%;
  }
  .manual-box{
    display:none;
    margin-top:12px;
  }
  .manual-box.show{ display:block; }
  .manual-box input{
    width:100%;
    background:#0d0f13;
    border:1px solid var(--card-border);
    border-radius:10px;
    padding:10px 12px;
    color:var(--text);
    font-family:'JetBrains Mono',monospace;
    font-size:14px;
    outline:none;
  }
  .manual-box input:focus{ border-color:var(--blue); }
  .manual-hint{
    font-size:11.5px;
    color:var(--muted);
    margin-top:6px;
    line-height:1.4;
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="eyebrow">Achat-revente</div>
  <h1>💱 Convertisseur € / ¥</h1>
  <div class="sub">Euro ↔ Yuan chinois (CNY), taux de change en direct.</div>

  <div class="card">
    <div class="field-label" id="labelFrom">Euro (€)</div>
    <div class="amount-row">
      <input type="number" id="amountFrom" inputmode="decimal" placeholder="0" value="1">
      <div class="currency-tag" id="tagFrom">EUR</div>
    </div>

    <div class="swap-row">
      <button class="swap-btn" id="swapBtn" title="Inverser">🔄</button>
    </div>

    <div class="field-label" id="labelTo">Yuan (¥)</div>
    <div class="amount-row">
      <input type="number" id="amountTo" inputmode="decimal" placeholder="0">
      <div class="currency-tag" id="tagTo">CNY</div>
    </div>

    <div class="rate-line">
      <span><span class="status-dot" id="statusDot"></span><span id="statusText">Chargement du taux...</span></span>
      <span class="rate-val" id="rateVal"></span>
    </div>

    <button class="refresh-btn" id="refreshBtn">🔁 Actualiser le taux</button>
    <button class="manual-toggle" id="manualToggle">Saisir un taux manuellement</button>

    <div class="manual-box" id="manualBox">
      <input type="number" id="manualRate" inputmode="decimal" placeholder="Ex : 7.85 (1€ = combien de ¥)">
      <div class="manual-hint">Utile si t'as pas internet ou si tu veux appliquer le taux exact de ton agent (souvent légèrement différent du taux officiel).</div>
    </div>
  </div>
</div>

<script>
  const elAmountFrom = document.getElementById('amountFrom');
  const elAmountTo = document.getElementById('amountTo');
  const elLabelFrom = document.getElementById('labelFrom');
  const elLabelTo = document.getElementById('labelTo');
  const elTagFrom = document.getElementById('tagFrom');
  const elTagTo = document.getElementById('tagTo');
  const elSwapBtn = document.getElementById('swapBtn');
  const elStatusDot = document.getElementById('statusDot');
  const elStatusText = document.getElementById('statusText');
  const elRateVal = document.getElementById('rateVal');
  const elRefreshBtn = document.getElementById('refreshBtn');
  const elManualToggle = document.getElementById('manualToggle');
  const elManualBox = document.getElementById('manualBox');
  const elManualRate = document.getElementById('manualRate');

  const RATE_CACHE_KEY = 'eur_cny_rate_cache';
  const FALLBACK_RATE = 7.85; // utilisé seulement si aucune connexion et aucun cache

  let direction = 'eur-to-cny'; // ou 'cny-to-eur'
  let eurToCnyRate = null;
  let rateSource = 'none'; // 'live' | 'cache' | 'manual' | 'fallback'

  function updateLabels(){
    if (direction === 'eur-to-cny'){
      elLabelFrom.textContent = 'Euro (€)';
      elLabelTo.textContent = 'Yuan (¥)';
      elTagFrom.textContent = 'EUR';
      elTagTo.textContent = 'CNY';
    } else {
      elLabelFrom.textContent = 'Yuan (¥)';
      elLabelTo.textContent = 'Euro (€)';
      elTagFrom.textContent = 'CNY';
      elTagTo.textContent = 'EUR';
    }
  }

  function currentRate(){
    // Toujours en EUR -> CNY de base, on l'inverse si besoin
    if (direction === 'eur-to-cny') return eurToCnyRate;
    return 1 / eurToCnyRate;
  }

  function recompute(fromInputChanged){
    if (!eurToCnyRate) return;
    const rate = currentRate();

    if (fromInputChanged){
      const val = parseFloat(elAmountFrom.value);
      elAmountTo.value = isNaN(val) ? '' : (val * rate).toFixed(2);
    } else {
      const val = parseFloat(elAmountTo.value);
      elAmountFrom.value = isNaN(val) ? '' : (val / rate).toFixed(2);
    }

    const label = direction === 'eur-to-cny' ? '1€ =' : '1¥ =';
    const unit = direction === 'eur-to-cny' ? '¥' : '€';
    elRateVal.textContent = `${label} ${rate.toFixed(4)} ${unit}`;
  }

  function setStatus(kind, text){
    elStatusDot.className = 'status-dot' + (kind === 'live' ? ' live' : (kind === 'offline' ? ' offline' : ''));
    elStatusText.textContent = text;
  }

  async function fetchRate(){
    setStatus('', 'Chargement du taux...');
    try{
      const res = await fetch('https://open.er-api.com/v6/latest/EUR');
      if (!res.ok) throw new Error('Réponse invalide');
      const data = await res.json();
      if (!data.rates || !data.rates.CNY) throw new Error('Taux CNY manquant');

      eurToCnyRate = data.rates.CNY;
      rateSource = 'live';

      try{
        localStorage.setItem(RATE_CACHE_KEY, JSON.stringify({
          rate: eurToCnyRate,
          date: new Date().toISOString()
        }));
      } catch(e){}

      setStatus('live', 'Taux en direct');
      recompute(true);
    }
    catch(e){
      // Pas d'internet ou API indisponible : on retombe sur le cache local, sinon une valeur par défaut
      let cached = null;
      try{
        cached = JSON.parse(localStorage.getItem(RATE_CACHE_KEY) || 'null');
      } catch(err){}

      if (cached && cached.rate){
        eurToCnyRate = cached.rate;
        rateSource = 'cache';
        const d = new Date(cached.date);
        setStatus('offline', `Taux hors-ligne (sauvegardé le ${d.toLocaleDateString('fr-FR')})`);
      } else {
        eurToCnyRate = FALLBACK_RATE;
        rateSource = 'fallback';
        setStatus('offline', 'Taux estimé (pas de connexion)');
      }
      recompute(true);
    }
  }

  elAmountFrom.addEventListener('input', () => recompute(true));
  elAmountTo.addEventListener('input', () => recompute(false));

  elSwapBtn.addEventListener('click', () => {
    direction = direction === 'eur-to-cny' ? 'cny-to-eur' : 'eur-to-cny';
    updateLabels();
    elSwapBtn.classList.add('spin');
    setTimeout(() => elSwapBtn.classList.remove('spin'), 200);

    const tmp = elAmountFrom.value;
    elAmountFrom.value = elAmountTo.value;
    elAmountTo.value = tmp;
    recompute(true);
  });

  elRefreshBtn.addEventListener('click', fetchRate);

  elManualToggle.addEventListener('click', () => {
    elManualBox.classList.toggle('show');
    if (elManualBox.classList.contains('show') && eurToCnyRate){
      const rateToShow = direction === 'eur-to-cny' ? eurToCnyRate : (1 / eurToCnyRate);
      elManualRate.value = rateToShow.toFixed(4);
    }
  });

  elManualRate.addEventListener('input', () => {
    const val = parseFloat(elManualRate.value);
    if (isNaN(val) || val <= 0) return;

    eurToCnyRate = direction === 'eur-to-cny' ? val : (1 / val);
    rateSource = 'manual';
    setStatus('', 'Taux manuel');
    recompute(true);
  });

  updateLabels();
  fetchRate();
</script>
</body>
</html>
