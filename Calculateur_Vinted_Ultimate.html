cument.getElementById('vente').value);let achat=cny/taux;let livraison=(poids/1000)*liv;let total=achat+livraison;let profit=vente-total;let marge=vente?profit/vente*100:0;let badge='🔴 À éviter';if(profit>=20)badge='🟢 Excellente affaire';else if(profit>=10)badge='🟡 Correcte';document.getElementById('res').innerHTML='💰 Coût article : '+achat.toFixed(2)+' €<br>📦 Livraison : '+livraison.toFixed(2)+' €<br>💸 Coût total : '+total.toFixed(2)+' €<br>💵 Profit : '+profit.toFixed(2)+' €<br>📈 Marge : '+marge.toFixed(1)+' %<br><br>'+badge;}</script></body></html>
