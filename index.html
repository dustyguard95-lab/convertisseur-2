<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#111">

<title>Allverter V9</title>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
background:#111;
color:white;
max-width:1000px;
margin:auto;
padding:16px;
}

.card{
background:#1c1c1e;
border-radius:18px;
padding:15px;
margin:12px 0;
}

textarea,input,select,button{
width:100%;
box-sizing:border-box;
border:none;
border-radius:12px;
padding:14px;
font-size:15px;
}

textarea,input,select{
background:#2c2c2e;
color:white;
margin-top:8px;
}

button{
background:#0A84FF;
color:white;
font-weight:bold;
margin-top:8px;
}

button:active{
transform:scale(.98);
}

.logo{
text-align:center;
font-size:55px;
}

.small{
font-size:12px;
color:#aaa;
word-break:break-all;
}

.badge{
display:inline-block;
background:#333;
padding:5px 10px;
border-radius:20px;
margin:3px;
}

h1{
text-align:center;
}

</style>
</head>


<body>


<div class="logo">🔄</div>

<h1>Allverter V9</h1>

<p style="text-align:center;color:#aaa">
Convertisseur multi-agents Weidian / Taobao / 1688
</p>



<div class="card">


<textarea id="url"
placeholder="Colle un lien Weidian, Taobao, 1688 ou agent"></textarea>


<select id="agentChoice">

<option value="lovegobuy">
🔵 LoveGoBuy
</option>

<option value="allchinabuy">
🟣 AllChinaBuy
</option>

</select>



<button onclick="pasteAndConvert()">
📋 Coller & Convertir
</button>


<button onclick="convert()">
⚡ Convertir
</button>


</div>



<div class="card">


<div id="status">
Prêt
</div>


<input id="result"
readonly
placeholder="Résultat">


<button onclick="copyResult()">
📄 Copier
</button>


</div>



<div class="card">

<h3>Analyse</h3>

<div id="details"></div>

</div>




<div class="card">


<h3>⭐ Favoris</h3>


<button onclick="addFavorite()">
Ajouter aux favoris
</button>


<div id="favorites"></div>


</div>





<div class="card">


<h3>🕘 Historique</h3>


<input id="search"
placeholder="Rechercher..."
oninput="renderHistory()">



<div id="history"></div>


</div>




<script>



const AGENTS=[
"acbuy",
"allchinabuy",
"hipobuy",
"mulebuy",
"oopbuy",
"kakobuy",
"usfans",
"litbuy",
"superbuy",
"joyabuy",
"cssbuy",
"cnfans"
];





async function pasteAndConvert(){

try{

url.value=
await navigator.clipboard.readText();

convert();

}

catch(e){}

}







function detectAgent(u){

u=u.toLowerCase();


for(let a of AGENTS){

if(u.includes(a))
return a;

}


return "direct";

}







function detectShop(u){

u=u.toLowerCase();


if(
u.includes("1688") ||
u.includes("ali_1688")
)
return "ali_1688";



if(
u.includes("taobao") ||
u.includes("tmall")
)
return "taobao";



return "weidian";

}








function extractId(u){


try{


let d=decodeURIComponent(u);



let patterns=[

/itemID=(\d+)/i,

/itemId=(\d+)/i,

/goodsId=(\d+)/i,

/product\/weidian\/(\d+)/i,

/goods\/WEIDIAN\/(\d+)/i,

/id=(\d+)/i

];



for(let p of patterns){

let m=d.match(p);

if(m)
return m[1];

}



let nums=d.match(/\d{8,20}/g);


return nums ?
nums.sort((a,b)=>b.length-a.length)[0]
:"";



}

catch(e){

return "";

}

}









function convert(){



let u=url.value.trim();



if(!u){

status.innerHTML="⚠️ Colle un lien";

return;

}




let id=extractId(u);


let shop=detectShop(u);


let agent=detectAgent(u);



let choice=
document.getElementById("agentChoice").value;



let out="";





if(choice==="lovegobuy"){


if(!id){

status.innerHTML="⚠️ ID introuvable";

return;

}


out=
`https://www.lovegobuy.com/product?id=${id}&shop_type=${shop}`;


}





if(choice==="allchinabuy"){


out=
`https://www.allchinabuy.com/en/page/buy?url=${encodeURIComponent(u)}`;


}






result.value=out;


status.innerHTML=
"✅ Conversion réussie";



details.innerHTML=

`
<span class="badge">${agent}</span>
<span class="badge">${shop}</span>
<span class="badge">${choice}</span>
${id ? `<span class="badge">${id}</span>`:""}

`;





let h=
JSON.parse(
localStorage.getItem("allverter_hist")||"[]"
);



h.unshift(out);


h=[...new Set(h)].slice(0,500);



localStorage.setItem(
"allverter_hist",
JSON.stringify(h)
);



renderHistory();


}









function copyResult(){

navigator.clipboard.writeText(result.value);

}










function addFavorite(){


if(!result.value)
return;



let f=
JSON.parse(
localStorage.getItem("allverter_fav")||"[]"
);



f.unshift(result.value);


f=[...new Set(f)].slice(0,100);



localStorage.setItem(
"allverter_fav",
JSON.stringify(f)
);



renderFav();


}










function renderFav(){


let f=
JSON.parse(
localStorage.getItem("allverter_fav")||"[]"
);



favorites.innerHTML=

f.map(x=>
`<div class="small">⭐ ${x}</div>`
).join("");



}









function renderHistory(){



let h=
JSON.parse(
localStorage.getItem("allverter_hist")||"[]"
);



let q=
(search.value||"").toLowerCase();



history.innerHTML=

h
.filter(x=>x.toLowerCase().includes(q))
.map(x=>
`<div class="small">${x}</div>`
)
.join("");



}






renderFav();

renderHistory();



</script>


</body>
</html>
