<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculateur Vinted / LoveGoBuy</title>

<style>
body{
    background:#121212;
    color:#eaeaea;
    font-family:Arial,sans-serif;
    max-width:700px;
    margin:auto;
    padding:20px;
}

h2{
    text-align:center;
}

label{
    display:block;
    margin-top:10px;
}

input{
    width:100%;
    padding:10px;
    margin-top:5px;
    background:#1e1e1e;
    color:white;
    border:1px solid #333;
    border-radius:8px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    background:#2d2d2d;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#3a3a3a;
}

.result{
    margin-top:20px;
    padding:15px;
    background:#1e1e1e;
    border-radius:8px;
    font-weight:bold;
    line-height:1.8;
}
</style>
</head>

<body>

<h2>📦 Calculateur Vinted / LoveGoBuy</h2>

<label for="cny">Prix article (CNY)</label>
<input type="number" id="cny" value="80">

<label for="poids">Poids (g)</label>
<input type="number" id="poids" value="500">

<label for="taux">Taux CNY → €</label>
<input type="number" id="taux" value="8" step="0.01">

<label for="liv">Livraison (€ par kg)</label>
<input type="number" id="liv" value="15" step="0.01">

<label for="vente">Prix de vente prévu (€)</label>
<input type="number" id="vente" value="30" step="0.01">

<button onclick="calc()">Calculer</button>

<div class="result" id="res">
Entre les valeurs puis clique sur "Calculer".
</div>

<script>
function calc() {

    let cny = Number(document.getElementById("cny").value);
    let poids = Number(document.getElementById("poids").value);
    let taux = Number(document.getElementById("taux").value);
    let liv = Number(document.getElementById("liv").value);
    let vente = Number(document.getElementById("vente").value);

    let achat = cny / taux;
    let livraison = (poids / 1000) * liv;
    let total = achat + livraison;

    let profit = vente - total;
    let marge = vente > 0 ? (profit / vente) * 100 : 0;

    document.getElementById("res").innerHTML =
        "💰 Coût total : " + total.toFixed(2) + " €<br>" +
        "📦 Livraison estimée : " + livraison.toFixed(2) + " €<br>" +
        "💵 Profit : " + profit.toFixed(2) + " €<br>" +
        "📈 Marge : " + marge.toFixed(1) + " %";
}
</script>

</body>
</html>
